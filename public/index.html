<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>បោកអ៊ុត Finder · Laundry Near You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Khmer:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Animated background -->
    <div class="bg-bubbles">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🧺</span>
        <div>
          <div class="logo-title">បោកអ៊ុត Finder</div>
          <div class="logo-sub">Laundry Near You</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="radius-selector">
          <label>Radius</label>
          <div class="radius-btns">
            <button class="radius-btn" data-r="300">300m</button>
            <button class="radius-btn active" data-r="500">500m</button>
            <button class="radius-btn" data-r="1000">1km</button>
            <button class="radius-btn" data-r="2000">2km</button>
            <button class="radius-btn" data-r="5000">5km</button>
            <button class="radius-btn" data-r="10000">10km</button>
          </div>
        </div>
        <button class="btn-locate" id="btnLocate">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
          Locate Me
        </button>
      </div>
    </header>

    <!-- Location Banner -->
    <div class="location-banner" id="locationBanner" style="display:none">
      <div class="loc-left">
        <div class="loc-pulse"><span></span></div>
        <div class="loc-info">
          <div class="loc-label">Your Location</div>
          <div class="loc-address" id="locAddress">Detecting…</div>
        </div>
      </div>
      <div class="loc-coords" id="locCoords"></div>
    </div>

    <!-- Main layout -->
    <main class="main-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="results-info" id="resultsInfo">
            <span class="results-count" id="resultsCount">—</span>
            <span class="results-label">laundry shops found</span>
          </div>
          <div class="sort-row">
            <span class="sort-label">Sort:</span>
            <select id="sortSelect" class="sort-select">
              <option value="distance">Nearest first</option>
              <option value="rating">Highest rated</option>
              <option value="name">A–Z</option>
            </select>
          </div>
        </div>

        <div class="list-container" id="listContainer">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📍</div>
            <div class="empty-title">Find Laundry Near You</div>
            <div class="empty-desc">Click <strong>Locate Me</strong> to detect your location and discover nearby laundry shops.</div>
            <button class="btn-start" id="btnStart">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
              Get My Location
            </button>
          </div>
        </div>
      </aside>

      <!-- Map -->
      <section class="map-section">
        <div id="map"></div>
        <div class="map-overlay" id="mapOverlay">
          <div class="overlay-content">
            <div class="spinner-wrap">
              <div class="spinner"></div>
            </div>
            <p id="overlayMsg">Initializing map…</p>
          </div>
        </div>

        <!-- Detail panel -->
        <div class="detail-panel" id="detailPanel">
          <button class="detail-close" id="detailClose">✕</button>
          <div class="detail-content" id="detailContent"></div>
        </div>
      </section>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
    <script>
      // Load Google Maps after getting API key from server
      fetch("/api/config")
        .then((r) => r.json())
        .then((cfg) => {
          if (cfg.error) {
            document.getElementById("overlayMsg").textContent = "⚠️ " + cfg.error;
            return;
          }
          const s = document.createElement("script");
          s.src = `https://maps.googleapis.com/maps/api/js?key=${cfg.apiKey}&callback=initMap&libraries=places&loading=async`;
          s.async = true;
          s.defer = true;
          document.head.appendChild(s);
        })
        .catch(() => {
          document.getElementById("overlayMsg").textContent = "⚠️ Could not connect to server. Make sure it's running.";
        });
    </script>
  </body>
</html>
